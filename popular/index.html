    ["devtools","🛠️","JSON & Regex Dev Tools","https://slashmantools.us/json-regex-devtools/"],["pwgen","🔐","Password Generator","https://slashmantools.us/password-generator/"],

    ["calc","🧮","Calculators","https://slashmantools.us/calculators/"],["devkit","🧑‍💻","Developer Tools","https://slashmantools.us/dev-tools/"],
    ["colortools","🎨","Color Tools","https://slashmantools.us/color-tools/"],["pdftools","📄","PDF Tools","https://slashmantools.us/pdf-tools/"],

function setLang(l){if(!(I18N.title&&I18N.title[l]))l="en";LANG=l;document.querySelectorAll("[data-i18n]").forEach(function(el){var t=I18N[el.getAttribute("data-i18n")];if(t&&t[l]!=null){if(el.id==="board")return;el.textContent=(el.tagName==="H1"?"🏆 ":el.getAttribute("data-i18n")==="browse"?"🧰 ":"")+t[l];}});document.documentElement.lang=l==="zh"?"zh-Hant":l;document.documentElement.dir=_RTL.indexOf(l)>-1?"rtl":"ltr";var s=document.getElementById("langSel");if(s)s.value=l;try{localStorage.setItem("site_lang",l)}catch(e){}render();}

async function getCount(key){try{const r=await fetch("https://abacus.jasoncameron.dev/get/sm413-"+key+"/views");if(!r.ok)return 0;const d=await r.json();return Number(d.value)||0;}catch(e){return 0;}}

   board.appendChild(a);});
  document.getElementById("upd").textContent=(I18N.updated[LANG]||"Updated")+" "+new Date().toLocaleString();}
