name: Marketing Report (keyless)

on:
  schedule:
    - cron: "0 1 * * 1"   # Mondays 01:00 UTC = 09:00 Taiwan — weekly market-fit report
  workflow_dispatch: {}

concurrency:
  group: marketing-report
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (no AI / no API key)
        run: pip install --quiet pytrends requests

      - name: Build market-fit report
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python build_marketing.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketing/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(marketing): weekly market-fit report ($(date -u +%F))

          author: claude-code"
            git push
          fi

  notify-failure:
    needs: [run]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord failure alert
        run: >-
          curl -sf -H "Content-Type: application/json"
          -d '{"content": "\ud83d\udd34 ${{ github.repository }} \u2014 ${{ github.workflow }} \u6392\u7a0b\u5931\u6557 \u00b7 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          "${{ secrets.DISCORD_WEBHOOK }}" || true
