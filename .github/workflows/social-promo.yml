name: Social Media Promo

on:
  schedule:
    - cron: '11 2 * * *'   # 02:11 UTC = 10:11 Taiwan (morning -> sites 1-3)
    - cron: '11 7 * * *'   # 07:11 UTC = 15:11 Taiwan (afternoon -> sites 4-6)
  workflow_dispatch:
    inputs:
      slot:
        description: 'Which set to post: am (sites 1-3) or pm (sites 4-6)'
        default: 'am'
        type: choice
        options:
          - am
          - pm

jobs:
  post-promo:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system fonts (CJK support for promo images)
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install playwright pillow

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run social promo
        env:
          THREADS_CHROME_SESSION: ${{ secrets.THREADS_CHROME_SESSION }}
          IG_SESSION_JSON: ${{ secrets.IG_SESSION_JSON }}
          FB_SESSION_JSON: ${{ secrets.FB_SESSION_JSON }}
          PROMO_SLOT: ${{ github.event.inputs.slot || (github.event.schedule == '11 2 * * *' && 'am' || 'pm') }}
        run: python social_promo.py
