name: Social Media Promo

on:
  schedule:
    - cron: '11 2 * * *'   # 02:11 UTC = 10:11 Taiwan (morning -> sites 1-3)
    - cron: '11 7 * * *'   # 07:11 UTC = 15:11 Taiwan (afternoon -> sites 4-6)
  workflow_dispatch:
    inputs:
      slot:
        description: 'Which set to post: am (sites 1-3) or pm (sites 4-6)'
        default: 'am'
        type: choice
        options:
          - am
          - pm
      platforms:
        description: 'Platforms (comma-separated: facebook,instagram,threads). Empty = all'
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # needed to publish promo images for IG/Threads auto-post

jobs:
  post-promo:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system fonts (CJK support for promo images)
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install pillow requests

      - name: Configure git (for hosting promo images)
        run: |
          git config user.name "Massor"
          git config user.email "slashman413@gmail.com"

      - name: Run social promo
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PROMO_SLOT: ${{ github.event.inputs.slot || (github.event.schedule == '11 2 * * *' && 'am' || 'pm') }}
          PROMO_PLATFORMS: ${{ github.event.inputs.platforms }}
          # ── Meta auto-post (dormant until these secrets are set) ──
          META_AUTOPOST: ${{ secrets.META_AUTOPOST }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_GRAPH_TOKEN: ${{ secrets.IG_GRAPH_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
        run: python social_promo.py

      - name: Notify Discord on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl -s -H "Content-Type: application/json" \
              -d "{\"content\":\"🔴 social-promo（社群自動轉發）失敗！log：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" "$WEBHOOK"
          fi

  notify-failure:
    needs: [post-promo]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord failure alert
        run: >-
          curl -sf -H "Content-Type: application/json"
          -d '{"content": "\ud83d\udd34 ${{ github.repository }} \u2014 ${{ github.workflow }} \u6392\u7a0b\u5931\u6557 \u00b7 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          "${{ secrets.DISCORD_WEBHOOK }}" || true
