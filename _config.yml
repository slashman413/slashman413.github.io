# GitHub Pages (Jekyll) config.
# Keep developer/automation scripts and repo meta files OUT of the published site
# (they were previously downloadable at the site root — not user-facing content).
exclude:
  - "*.py"
  - capture_sessions.py
  - social_promo.py
  - requirements.txt
  - Gemfile
  - Gemfile.lock
  - README.md
  - readme.md
  - LICENSE
  - .gitignore
